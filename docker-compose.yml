version: "3.9"

services:
  db:
    image: postgres:15
    container_name: AE-postgres-container
    env_file:
      - .env
    ports:
      - "5433:5432"

  backend:
    build: ./server
    container_name: AE-django-container
    command: sh -c "gunicorn aisle_earthlings.wsgi --bind 0.0.0.0:8000 --reload"
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app
    depends_on:
      - db

  frontend:
    image: client-img
    build: ./client
    container_name: AE-client-container
    ports:
      - "80:80"
    volumes:
        - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
        - ./client/dist:/usr/share/nginx/html
    depends_on:
      - backend